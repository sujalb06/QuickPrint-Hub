<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="login.css">
</head>
<body>
        
        <div class="login-wrapper">
        <div class="login-card">
            
            <div class="logo-container">
                <div class="logo-icon">🖨️</div>
                <h1>QuickPrint Hub</h1>
                <p>Skip the queue, print smarter.</p>
            </div>
 
            <!-- Role Tabs: Student ya Shopkeeper -->
            <div class="role-tabs">
                <button type="button" class="tab-btn active" id="userTab" onclick="switchRole('user')">Student</button>
                <button type="button" class="tab-btn" id="adminTab" onclick="switchRole('admin')">Shopkeeper</button>
            </div>
 
            <form id="loginForm" onsubmit="handleLogin(event)">
                
                <!-- Full Name -->
                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="E.g. Sujal" required autocomplete="name">
                </div>
 
                <!-- Phone Number -->
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <div class="phone-input-wrapper">
                        <span class="country-code">+91</span>
                        <input type="tel" id="phone" pattern="[0-9]{10}" placeholder="10-digit mobile number" required autocomplete="tel">
                    </div>
                </div>
 
                <!-- User Code (OTP ki jagah) -->
                <div class="input-group">
                    <label for="userCode" id="userCodeLabel">Student Code</label>
                    <div class="code-input-wrapper">
                        <span class="code-icon">🔑</span>
                        <input type="password" id="userCode" placeholder="Enter your campus code" required autocomplete="off">
                    </div>
                    <!-- <p class="help-text">Use the campus access code shared by your institution.</p> -->
                </div>
 
                <!-- Login Button -->
                <button type="submit" class="btn success-btn w-100" id="loginBtn">
                    Verify & Secure Login 🔒
                </button>
 
            </form>
            
        </div>
    </div>
 
    <script src="login.js"></script>
 
</body>
</html>
