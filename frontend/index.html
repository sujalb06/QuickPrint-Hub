<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="login.css">
</head>
<body>
        
        <div class="login-wrapper">
        <div class="login-card">
 
            <div class="logo-container">
                <div class="logo-icon">🖨️</div>
                <h1>QuickPrint Hub</h1>
                <p>Skip the queue, print smarter.</p>
            </div>
 
            <!-- Role Tabs -->
            <div class="role-tabs">
                <button type="button" class="tab-btn active" id="userTab"  onclick="switchRole('user')">Student</button>
                <button type="button" class="tab-btn" id="adminTab" onclick="switchRole('admin')">Shopkeeper</button>
            </div>
 
            <!-- STEP 1: Naam + Number -->
            <div id="step1">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter name here">
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <div class="phone-input-wrapper">
                        <span class="country-code">+91</span>
                        <input type="tel" id="phone" placeholder="10-digit number" maxlength="10">
                    </div>
                </div>
                <button type="button" class="btn primary-btn w-100" id="sendOtpBtn" onclick="sendOTP()">
                    Send OTP
                </button>
            </div>
 
            <!-- STEP 2: OTP (pehle hidden) -->
            <div id="step2" class="hidden">
                <p class="otp-sent-msg" id="otpSentMsg"></p>
                <div class="input-group">
                    <label>Enter OTP</label>
                    <div class="otp-input-wrapper">
                        <span class="code-icon">🔑</span>
                        <input type="text" id="otpInput" placeholder="ENTER OTP" maxlength="6" autocomplete="one-time-code">
                    </div>
                    <p class="help-text" id="resendTimer"></p>
                </div>
                <button type="button" class="btn success-btn w-100" onclick="verifyOTP()">
                    Verify & Login 🔒
                </button>
                <!-- <button type="button" class="btn-back" onclick="goBack()">← Change Number</button> -->
            </div>
 
        </div>
    </div>
 
    <script src="login.js"></script>
 
</body>
</html>
